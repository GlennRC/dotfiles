# Alacritty — minimal renderer for Zellij multiplexer
# Cmd → Zellij (via Alt escape translation), Ctrl+Cmd → AeroSpace

[window]
padding = { x = 4, y = 4 }
decorations = "Buttonless"
startup_mode = "Maximized"
option_as_alt = "Both"

[font]
size = 14.0

[terminal]
shell = { program = "/bin/zsh", args = ["-l", "-c", "zellij attach -c local"] }
osc52 = "CopyPaste"

[scrolling]
history = 0  # Zellij handles scrollback

# Cmd → Alt (ESC) translation for Zellij
# Alacritty intercepts Cmd+key and sends the Alt escape sequence.
# Zellij config stays as Alt+key — works identically on remote SSH.
# Cmd+V/C kept as paste/copy — use Option+V for Zellij scroll mode.
[keyboard]
bindings = [
  # Tabs
  { key = "T",      mods = "Command",       chars = "\u001bt" },
  { key = "R",      mods = "Command",       chars = "\u001br" },
  { key = "[",      mods = "Command",       chars = "\u001b[" },
  { key = "]",      mods = "Command",       chars = "\u001b]" },
  { key = "Back",   mods = "Command",       chars = "\u001b\u007f" },
  { key = "1",      mods = "Command",       chars = "\u001b1" },
  { key = "2",      mods = "Command",       chars = "\u001b2" },
  { key = "3",      mods = "Command",       chars = "\u001b3" },
  { key = "4",      mods = "Command",       chars = "\u001b4" },
  { key = "5",      mods = "Command",       chars = "\u001b5" },
  { key = "6",      mods = "Command",       chars = "\u001b6" },
  { key = "7",      mods = "Command",       chars = "\u001b7" },
  { key = "8",      mods = "Command",       chars = "\u001b8" },
  { key = "9",      mods = "Command",       chars = "\u001b9" },
  # Panes
  { key = "D",      mods = "Command",       chars = "\u001bd" },
  { key = "D",      mods = "Command|Shift", chars = "\u001bD" },
  { key = "S",      mods = "Command",       chars = "\u001bs" },
  { key = "W",      mods = "Command",       chars = "\u001bw" },
  { key = "Return", mods = "Command",       chars = "\u001b\u000d" },
  { key = "F",      mods = "Command",       chars = "\u001bf" },
  # Navigate (ISRT) — Cmd sends Alt escape to Zellij
  { key = "E",      mods = "Command",       chars = "\u001be" },
  { key = "A",      mods = "Command",       chars = "\u001ba" },
  { key = "O",      mods = "Command",       chars = "\u001bo" },
  # New Alacritty window
  { key = "N",      mods = "Command",       action = "CreateNewWindow" },
  # Resize (ISRT + Shift)
  { key = "N",      mods = "Command|Shift", chars = "\u001bN" },
  { key = "E",      mods = "Command|Shift", chars = "\u001bE" },
  { key = "A",      mods = "Command|Shift", chars = "\u001bA" },
  { key = "O",      mods = "Command|Shift", chars = "\u001bO" },
  # Session
  { key = "Q",      mods = "Command",       chars = "\u001bq" },
]

# One Dark theme (matching Ghostty/tmux)
[colors.primary]
background = "#282c34"
foreground = "#abb2bf"

[colors.cursor]
text = "#282c34"
cursor = "#abb2bf"

[colors.selection]
text = "#abb2bf"
background = "#3e4452"

[colors.normal]
black   = "#181a1f"
red     = "#e86671"
green   = "#98c379"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#56b6c2"
white   = "#abb2bf"

[colors.bright]
black   = "#5c6370"
red     = "#e86671"
green   = "#98c379"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#56b6c2"
white   = "#ffffff"
