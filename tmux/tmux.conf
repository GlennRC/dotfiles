# =============================================================================
# tmux config — local macOS (mirrors hpnsw6803 bindings, One Dark theme)
# =============================================================================

# General
set -g prefix C-b
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -s escape-time 10
set -g focus-events on
set -g history-limit 50000

# Terminal / Color
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ',xterm-ghostty:RGB,xterm-256color:RGB'
set-option -ga terminal-overrides ',xterm-ghostty:Tc,xterm-256color:Tc'

# Clipboard (native macOS — no OSC52 needed locally)
set -g set-clipboard on

# Copy mode (vi)
setw -g mode-keys vi
bind -n M-v copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'V' send-keys -X select-line
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Window / Pane management (Alt+key, no prefix needed — same as hpnsw6803)
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-pane
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-Left  previous-window
bind -n M-Right next-window
bind -n M-0 next-window

# Pane focus (ISRT directional cluster)
bind -n M-n select-pane -L
bind -n M-e select-pane -U
bind -n M-a select-pane -D
bind -n M-o select-pane -R

# Pane resize (Alt+Shift+dir)
bind -n M-N resize-pane -L 5
bind -n M-E resize-pane -U 3
bind -n M-A resize-pane -D 3
bind -n M-O resize-pane -R 5

# Zoom
bind -n M-Enter resize-pane -Z

# Window selection
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Prefix-based actions
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind z resize-pane -Z
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# =============================================================================
# One Dark Theme (same as hpnsw6803)
# =============================================================================

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#21252b,fg=#abb2bf"
set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#21252b,fg=#61afef,nobold]"
set -g status-right "#[fg=#abb2bf,bg=#2c313a] #H #[fg=#61afef,bg=#2c313a]#[fg=#282c34,bg=#61afef,bold] %H:%M "

set -g window-status-format         "#[fg=#5c6370,bg=#21252b]  #I:#W  "
set -g window-status-current-format "#[fg=#21252b,bg=#98c379]#[fg=#282c34,bg=#98c379,bold] #I:#W #[fg=#98c379,bg=#21252b,nobold]"
set -g window-status-separator ""

set -g pane-border-style        "fg=#3e4451"
set -g pane-active-border-style "fg=#61afef"
set -g message-style            "bg=#e5c07b,fg=#282c34,bold"
set -g mode-style               "bg=#3e4451,fg=#abb2bf"
bind -n 'M-[' previous-window
bind -n 'M-]' next-window
